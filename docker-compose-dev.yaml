services:
  infinitude:
    container_name: infinitude
    hostname: infinitude
    image: nebulous/infinitude:edge
    entrypoint: "morbo -v /infinitude/infinitude"
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./:/infinitude/
    environment:
      - APP_SECRET=Pogotudinal
      - PASS_REQS=300
      #- SERIAL_TTY=/dev/ttyUSB0
      - SERIAL_SOCKET=192.168.1.23:23
      - MOJO_MODE=development
      - MOJO_LOG_COLOR=1
      - MOJO_LOG_LEVEL=debug
      - SCAN_THERMOSTAT=16
      - EMULATE_SAM=1
      - MQTT_BROKER=192.168.1.3:1883
#    devices:
#      - /dev/ttyUSB0:/dev/ttyUSB0
    restart: always
